info:
  name: get menu
  type: http
  seq: 1

http:
  method: GET
  url: "{{AUNTIE_SOM_NOODLE_BASE_URL}}/menu"
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isArray
    - expression: res.body
      operator: length
      value: "2"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
