info:
  name: create order invalid auth
  type: http
  seq: 5

http:
  method: POST
  url: "{{AUNTIE_SOM_NOODLE_BASE_URL}}/orders"
  body:
    type: json
    data: |-
      {
        "itemId":1,
        "quantity":1
      }
  auth:
    type: bearer
    token: "{{INVALID_TOKEN}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "401"
    - expression: res.body.orderId
      operator: isUndefined
    - expression: res.body.error
      operator: isString

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
