info:
  name: get menu by id
  type: http
  seq: 2

http:
  method: GET
  url: "{{AUNTIE_SOM_NOODLE_BASE_URL}}/menu?id=1"
  params:
    - name: id
      value: "1"
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isArray
    - expression: res.body
      operator: length
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
