info:
  name: create order non number
  type: http
  seq: 3

http:
  method: POST
  url: "{{AUNTIE_SOM_NOODLE_BASE_URL}}/orders"
  body:
    type: json
    data: |-
      {
        "itemId":"43",
        "quantity":"something??"
      }
  auth:
    type: bearer
    token: "{{TOKEN}}"

runtime:
  assertions:
    - expression: res.status
      operator: in
      value: "[400,401,404]"
    - expression: res.body.orderId
      operator: isUndefined
    - expression: res.body.error
      operator: isString

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
