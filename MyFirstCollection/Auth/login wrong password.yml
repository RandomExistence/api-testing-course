info:
  name: login wrong password
  type: http
  seq: 4

http:
  method: POST
  url: "{{AUNTIE_SOM_NOODLE_BASE_URL}}/auth/login"
  body:
    type: json
    data: |-
      {
        "username":"student",
        "password":"Hungry"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "401"
    - expression: res.body.accessToken
      operator: isUndefined
    - expression: res.body.error
      operator: isString

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
