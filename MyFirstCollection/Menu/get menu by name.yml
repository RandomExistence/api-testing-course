info:
  name: get menu by name
  type: http
  seq: 3

http:
  method: GET
  url: '{{AUNTIE_SOM_NOODLE_BASE_URL}}/menu?name="Fried Rice"'
  params:
    - name: name
      value: '"Fried Rice"'
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isArray
    - expression: res.body
      operator: length
      value: "1"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
