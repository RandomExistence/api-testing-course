info:
  name: create order negative quantity
  type: http
  seq: 2

http:
  method: POST
  url: "{{AUNTIE_SOM_NOODLE_BASE_URL}}/orders"
  body:
    type: json
    data: |-
      {
        "itemId":1,
        "quantity":-10
      }
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
