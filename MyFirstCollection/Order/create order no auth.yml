info:
  name: create order no auth
  type: http
  seq: 4

http:
  method: POST
  url: "{{AUNTIE_SOM_NOODLE_BASE_URL}}/orders"
  body:
    type: json
    data: |-
      {
        "itemId":1,
        "quantity":1
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "401"
    - expression: res.body.error
      operator: isString
    - expression: res.body.orderId
      operator: isUndefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
