info:
  name: get order no auth
  type: http
  seq: 7

http:
  method: GET
  url: "{{AUNTIE_SOM_NOODLE_BASE_URL}}/orders/{{LAST_ORDER_ID}}"
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "401"
    - expression: res.body.error
      operator: isString
    - expression: res.body.orderId
      operator: isUndefined

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
