info:
  name: get menu with auth
  type: http
  seq: 4

http:
  method: GET
  url: "{{AUNTIE_SOM_NOODLE_BASE_URL}}/menu"
  auth:
    type: bearer
    token: "{{TOKEN"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body
      operator: isArray
    - expression: res.body
      operator: length
      value: "2"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
