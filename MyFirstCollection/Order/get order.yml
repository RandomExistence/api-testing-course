info:
  name: get order
  type: http
  seq: 5

http:
  method: GET
  url: "{{AUNTIE_SOM_NOODLE_BASE_URL}}/orders/{{LAST_ORDER_ID}}"
  auth:
    type: bearer
    token: "{{TOKEN}}"

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.orderId
      operator: eq
      value: "{{LAST_ORDER_ID}}"
    - expression: res.body.status
      operator: isString
    - expression: res.body.totalPrice
      operator: isNumber

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
